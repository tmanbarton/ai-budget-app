<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Manager</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Budget Manager</h1>

    <div id="ai-input-section">
        <label for="ai-input">Describe your transaction</label>
        <input type="text" id="ai-input" placeholder="spent $40 on groceries yesterday">
        <button type="button" id="ai-submit">Add with AI</button>
    </div>

    <div class="separator">— or enter manually —</div>

    <form id="transaction-form">
        <label for="amount">Amount ($)</label>
        <input type="number" id="amount" name="amount" step="0.01" min="0.01" required>

        <label for="date">Date</label>
        <input type="date" id="date" name="date" required>

        <label for="category">Category</label>
        <select id="category" name="category" required>
            <option value="" disabled selected>Select a category</option>
            <option value="food">Food</option>
            <option value="housing">Housing</option>
            <option value="entertainment">Entertainment</option>
            <option value="utilities">Utilities</option>
            <option value="car stuff">Car Stuff</option>
            <option value="other">Other</option>
        </select>

        <button type="submit">Add Transaction</button>
    </form>
    <p id="status"></p>

    <h2 style="font-size: 1.1rem; margin-top: 24px;">Monthly Spending by Category</h2>
    <canvas id="chart"></canvas>

    <script src="app.js"></script>
</body>
</html>
